<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand-Tracking Zombie Shooter</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="three"></canvas>
    <div id="hud">
      <div id="reticle"></div>
      <div id="hand-overlay">
        <canvas id="hand-canvas" width="160" height="120"></canvas>
        <div id="hand-status">未検出</div>
      </div>
      <div id="hud-top">
        <div id="weapon-label">PISTOL</div>
        <div id="score-display">
          <div id="time-survived">00:00</div>
          <div id="kills">Kills: 0</div>
        </div>
      </div>
      <div id="hud-bottom">
        <div id="hp-container">
          <div id="hp-bar"></div>
          <div id="hp-text">100 / 100</div>
        </div>
        <div id="ammo-display">
          <div id="ammo-current">7</div>
          <div id="ammo-divider">/</div>
          <div id="ammo-max">7</div>
        </div>
      </div>
      <div id="banner"></div>
    </div>

    <div id="start-overlay">
      <div class="overlay-card">
        <h1>HAND-TRACKING ZOMBIE SHOOTER</h1>
        <p>Webカメラで手のトラッキングを行い、指鉄砲でゾンビを倒すサバイバルFPS。</p>
        <ul>
          <li>指鉄砲の形 → <b>拳銃</b></li>
          <li>両手で構える → <b>ライフル</b></li>
          <li>人差し指を曲げる → <b>発射</b></li>
          <li>手を画面外に出す → <b>リロード</b></li>
        </ul>
        <button id="start-btn">スタート（カメラ許可）</button>
        <button id="recalibrate-btn" style="display:none">再キャリブレーション</button>
      </div>
    </div>

    <div id="calibration-overlay" style="display:none">
      <div class="overlay-card">
        <h2 id="calib-title">キャリブレーション</h2>
        <p id="calib-instruction">準備中...</p>
        <div id="calib-step">Step 1 / 3</div>
        <div id="calib-progress"><div id="calib-progress-bar"></div></div>
        <div id="calib-status">手をかざしてください</div>
        <button id="calib-skip-btn">このステップをスキップ</button>
      </div>
    </div>

    <div id="gameover-overlay" style="display:none">
      <div class="overlay-card">
        <h1>GAME OVER</h1>
        <div id="gameover-stats">
          <div>生存時間: <span id="final-time">--</span></div>
          <div>キル数: <span id="final-kills">--</span></div>
        </div>
        <button id="restart-btn">もう一度</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
